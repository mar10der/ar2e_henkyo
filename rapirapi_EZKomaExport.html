<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AR2E 簡易コマ出力</title>
  <style>
    :root {
      --bg: linear-gradient(135deg, #f6efe4 0%, #e7f0ea 100%);
      --panel: rgba(255, 255, 255, 0.88);
      --panel-border: rgba(67, 84, 64, 0.14);
      --text: #243025;
      --muted: #5f6e5f;
      --accent: #2f6b4f;
      --accent-strong: #1f4d39;
      --shadow: 0 18px 45px rgba(41, 58, 44, 0.14);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "BIZ UDPGothic", "Yu Gothic UI", sans-serif;
      color: var(--text);
      background: var(--bg);
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .app {
      width: min(880px, 100%);
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: 24px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
      overflow: hidden;
    }

    .hero {
      padding: 28px 28px 18px;
      background:
        radial-gradient(circle at top right, rgba(66, 123, 92, 0.22), transparent 34%),
        radial-gradient(circle at left bottom, rgba(196, 156, 73, 0.16), transparent 30%);
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(1.7rem, 3vw, 2.3rem);
      line-height: 1.15;
    }

    .lead {
      margin: 0;
      color: var(--muted);
      line-height: 1.7;
    }

    .content {
      display: grid;
      gap: 18px;
      padding: 0 28px 28px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 700;
    }

    textarea,
    input[type="text"] {
      width: 100%;
      border: 1px solid rgba(72, 95, 75, 0.2);
      border-radius: 16px;
      padding: 14px 16px;
      font: inherit;
      color: var(--text);
      background: rgba(255, 255, 255, 0.92);
      transition: border-color 0.18s ease, box-shadow 0.18s ease;
    }

    textarea:focus,
    input[type="text"]:focus {
      outline: none;
      border-color: rgba(47, 107, 79, 0.55);
      box-shadow: 0 0 0 4px rgba(47, 107, 79, 0.12);
    }

    textarea {
      min-height: 360px;
      resize: vertical;
      line-height: 1.55;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 12px 20px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s ease, opacity 0.15s ease, background-color 0.15s ease;
    }

    button:hover {
      transform: translateY(-1px);
    }

    button:disabled {
      cursor: wait;
      opacity: 0.7;
      transform: none;
    }

    .primary {
      color: #fff;
      background: linear-gradient(135deg, var(--accent), var(--accent-strong));
    }

    .secondary {
      color: var(--accent-strong);
      background: rgba(47, 107, 79, 0.11);
    }

    .status {
      min-height: 1.6em;
      margin: 0;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .status.error {
      color: #a33d34;
    }

    @media (max-width: 640px) {
      body {
        padding: 14px;
      }

      .hero,
      .content {
        padding-left: 18px;
        padding-right: 18px;
      }

      textarea {
        min-height: 300px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="hero">
      <h1>AR2E 簡易コマ出力</h1>
      <p class="lead">ゆとシートIIのURLから、ココフォリア用のキャラクターコマJSONを生成します。<br>
    本作は、「著：菊池たけし／F.E.A.R」が権利を有する『アリアンロッドRPG2E』の二次創作作品です。<br>
    (C)F.E.A.R. 「アリアンロッドRPG 2E」</p>
    </section>

    <section class="content">
      <div>
        <label for="sheetUrl">ゆとシートのリンク</label>
        <input id="sheetUrl" type="text" placeholder="https://yutorize.work/ytsheet/ar2e/?id=xxxxxx">
      </div>

      <div class="actions">
        <button id="loadButton" class="primary" type="button">読み込み</button>
      </div>

      <p id="statusMessage" class="status"></p>

      <div>
        <label for="outputBox">出力</label>
        <textarea id="outputBox" spellcheck="false" placeholder="ここにココフォリア用の出力が入ります"></textarea>
      </div>

      <div class="actions">
        <button id="copyButton" class="secondary" type="button">クリップボードに書き出す</button>
      </div>
    </section>
  </main>

  <script>
    const loadButton = document.getElementById("loadButton");
    const copyButton = document.getElementById("copyButton");
    const sheetUrlInput = document.getElementById("sheetUrl");
    const outputBox = document.getElementById("outputBox");
    const statusMessage = document.getElementById("statusMessage");

    const abilityNames = ["筋力", "器用", "敏捷", "知力", "感知", "精神", "幸運"];

    function setStatus(message, isError = false) {
      statusMessage.textContent = message;
      statusMessage.classList.toggle("error", isError);
    }

    function normalizeBreaks(value) {
      return String(value ?? "")
        .replace(/&lt;br\s*\/?&gt;/gi, "\n")
        .replace(/<br\s*\/?>/gi, "\n");
    }

    function stripWikiLinks(value) {
      return value.replace(/\[\[([^\]<>]+?)(?:>|&gt;)[^\]]*?\]\]/g, "$1");
    }

    function valueToString(data, key) {
      if (!(key in data) || data[key] === null || data[key] === undefined) {
        return " ";
      }
      return stripWikiLinks(normalizeBreaks(data[key]));
    }

    function numericValue(data, key, fallback = 0) {
      const value = Number.parseInt(valueToString(data, key), 10);
      return Number.isFinite(value) ? value : fallback;
    }

    function buildMemo(data) {
      const playerName = valueToString(data, "playerName");
      const cl = valueToString(data, "level");
      const age = valueToString(data, "age");
      const classMain = valueToString(data, "classMain");
      const classSupport = valueToString(data, "classSupport");
      const gender = valueToString(data, "gender");
      const race = valueToString(data, "race");
      const origin = valueToString(data, "lifepathOrigin");
      const experience = valueToString(data, "lifepathExperience");
      const motive = valueToString(data, "lifepathMotive");
      const guild = valueToString(data, "guildName");
      const geisName = valueToString(data, "geis1Name");
      const geisNote = valueToString(data, "geis1Note");

      const memoLines = [
        `PL：${playerName}`,
        `CL：${cl}`,
        `${classMain} / ${classSupport}`,
        "",
        `${age} / ${gender} / ${race}`,
        `出自：${origin} / 境遇：${experience} / 目的：${motive}`,
        "",
        `ギルド：${guild}`
      ];

      if (geisName.trim() && geisName !== " ") {
        memoLines.push("●誓約");
        memoLines.push(geisName);
        if (geisNote.trim() && geisNote !== " ") {
          memoLines.push(geisNote);
        }
      }

      memoLines.push(
        ""
      );

      return memoLines.join("\n");
    }

    function buildStatus(data) {
      const hp = valueToString(data, "hpTotal");
      const mp = valueToString(data, "mpTotal");
      const fate = valueToString(data, "fateTotal");
      const weight = valueToString(data, "weightItems");
      const weightLimit = valueToString(data, "weightLimitItems");
      const def = valueToString(data, "battleTotalDef");
      const mdef = valueToString(data, "battleTotalMDef");

      return [
        { label: "HP", value: hp, max: hp },
        { label: "MP", value: mp, max: mp },
        { label: "フェイト", value: fate, max: fate },
        { label: "重量", value: weight, max: weightLimit },
        { label: "物理防御", value: def, max: "0" },
        { label: "魔法防御", value: mdef, max: "0" },
        { label: "ダイス", value: "0", max: "0" }
      ];
    }

    function buildParams(data) {
      return [
        { label: "CL", value: valueToString(data, "level") },
        { label: "移動力", value: valueToString(data, "battleTotalMove") },
        { label: "筋力", value: valueToString(data, "rollStr") },
        { label: "器用", value: valueToString(data, "rollDex") },
        { label: "敏捷", value: valueToString(data, "rollAgi") },
        { label: "知力", value: valueToString(data, "rollInt") },
        { label: "感知", value: valueToString(data, "rollSen") },
        { label: "精神", value: valueToString(data, "rollMnd") },
        { label: "幸運", value: valueToString(data, "rollLuk") }
      ];
    }

    function buildRollCommands() {
      return [
        "■能力判定",
        "{筋力判定}>=? 【筋力】判定",
        "{器用判定}>=? 【器用】判定",
        "{敏捷判定}>=? 【敏捷】判定",
        "{知力判定}>=? 【知力】判定",
        "{感知判定}>=? 【感知】判定",
        "{精神判定}>=? 【精神】判定",
        "{幸運判定}>=? 【幸運】判定",
        "■各種判定",
        "{命中判定}>=? 命中判定",
        "{攻撃力} 攻撃力",
        "{回避判定}>=? 回避判定@r",
        "{トラップ探知判定}>=? トラップ探知判定",
        "{トラップ解除判定}>=? トラップ解除判定",
        "{危険感知判定}>=? 危険感知判定",
        "{エネミー識別判定}>=? エネミー識別判定",
        "{アイテム鑑定判定}>=? アイテム鑑定判定",
        "{魔術判定}>=? 魔術判定",
        "{呪歌判定}>=? 呪歌判定",
        "{錬金術判定}>=? 錬金術判定",
        ""
      ].join("\n");
    }

    function buildSingleSkill(data, skillNumber) {
      const prefix = `skill${skillNumber}`;
      const name = valueToString(data, `${prefix}Name`);
      const sl = valueToString(data, `${prefix}Lv`);
      const timing = valueToString(data, `${prefix}Timing`);
      const roll = valueToString(data, `${prefix}Roll`);
      const target = valueToString(data, `${prefix}Target`);
      const range = valueToString(data, `${prefix}Range`);
      const reqd = valueToString(data, `${prefix}Reqd`);
      const cost = valueToString(data, `${prefix}Cost`);
      const category = valueToString(data, `${prefix}Category`);
      const note = valueToString(data, `${prefix}Note`);

      if (["パッシブ", "パッシブ／メイキング", " "].includes(timing)) {
        return "";
      }

      let text = `《${name}》${sl}：${timing}/${roll}/${target}/${range}/${reqd}[${cost}]　`;
      if (category !== " ") {
        text += `分類：${category}　`;
      }
      text += `${note}\n`;

      const costNumber = Number.parseInt(cost, 10);
      if (Number.isFinite(costNumber) && costNumber >= 1) {
        text += `:MP-${cost}\n`;
      }

      if (roll.includes("判定")) {
        text += `{${roll}}>=? ${roll}\n`;
      }

      if (abilityNames.includes(roll)) {
        text += `{${roll}判定}>=? ${roll}判定\n`;
      }

      return text;
    }

    function buildSkillCommands(data) {
      const skillNum = numericValue(data, "skillsNum", -1);
      if (skillNum < 0) {
        return "";
      }

      let text = "▲スキル\n";
      for (let i = 1; i <= skillNum; i += 1) {
        text += buildSingleSkill(data, i);
      }
      return text;
    }

    function buildParameterCommands(data) {
      const entries = [
        ["筋力判定", "rollStr", "rollStrDice"],
        ["器用判定", "rollDex", "rollDexDice"],
        ["敏捷判定", "rollAgi", "rollAgiDice"],
        ["知力判定", "rollInt", "rollIntDice"],
        ["感知判定", "rollSen", "rollSenDice"],
        ["精神判定", "rollMnd", "rollMndDice"],
        ["幸運判定", "rollLuk", "rollLukDice"]
      ];

      const otherEntries = [
        ["命中判定", "battleTotalAcc", "battleDiceAcc"],
        ["攻撃力", "battleTotalAtk", "battleDiceAtk"],
        ["回避判定", "battleTotalEva", "battleDiceEva"],
        ["トラップ探知判定", "rollTrapDetect", "rollTrapDetectDice"],
        ["トラップ解除判定", "rollTrapRelease", "rollTrapReleaseDice"],
        ["危険感知判定", "rollDangerDetect", "rollDangerDetectDice"],
        ["エネミー識別判定", "rollEnemyLore", "rollEnemyLoreDice"],
        ["アイテム鑑定判定", "rollAppraisal", "rollAppraisalDice"],
        ["魔術判定", "rollMagic", "rollMagicDice"],
        ["呪歌判定", "rollSong", "rollSongDice"],
        ["錬金術判定", "rollAlchemy", "rollAlchemyDice"]
      ];

      let text = "■代入パラメータ\n●能力判定用\n";
      for (const [label, valueKey, diceKey] of entries) {
        text += `//${label} = ${valueToString(data, valueKey)}+(${valueToString(data, diceKey)}+{ダイス})D\n`;
      }

      text += "●各種判定用\n";
      for (const [label, valueKey, diceKey] of otherEntries) {
        if (label === "攻撃力") {
          text += `//${label} = ${valueToString(data, valueKey)}+${valueToString(data, diceKey)}D\n`;
        } else {
          text += `//${label} = ${valueToString(data, valueKey)}+(${valueToString(data, diceKey)}+{ダイス})D\n`;
        }
      }

      return text;
    }

    function buildCharacterPayload(data, originalUrl) {
      return {
        kind: "character",
        data: {
          name: valueToString(data, "characterName"),
          playerName: valueToString(data, "playerName"),
          memo: buildMemo(data),
          initiative: numericValue(data, "battleTotalIni", 0),
          externalUrl: originalUrl,
          status: buildStatus(data),
          params: buildParams(data),
          faces: [],
          x: 0,
          y: 0,
          z: 0,
          angle: 0,
          width: 4,
          height: 4,
          active: true,
          secret: false,
          invisible: false,
          hideStatus: false,
          color: "",
          roomId: null,
          commands: buildSkillCommands(data) + buildRollCommands() + buildParameterCommands(data),
          speaking: true
        }
      };
    }

    function toJsonUrl(input) {
      const url = new URL(input);
      url.searchParams.set("mode", "json");
      return url.toString();
    }

    async function loadCharacter() {
      const originalUrl = sheetUrlInput.value.trim();
      if (!originalUrl) {
        setStatus("URLを入力してください。", true);
        return;
      }

      let jsonUrl;
      try {
        jsonUrl = toJsonUrl(originalUrl);
      } catch {
        setStatus("URLの形式が正しくありません。", true);
        return;
      }

      loadButton.disabled = true;
      setStatus("ゆとシートを読み込んでいます…");

      try {
        const response = await fetch(jsonUrl);
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        const data = await response.json();
        const payload = buildCharacterPayload(data, originalUrl);
        outputBox.value = JSON.stringify(payload);
        setStatus("出力を生成しました。");
      } catch (error) {
        console.error(error);
        setStatus("読み込みに失敗しました。ブラウザのCORS制限やURLの誤りの可能性があります。", true);
      } finally {
        loadButton.disabled = false;
      }
    }

    async function copyOutput() {
      if (!outputBox.value) {
        setStatus("先に出力を生成してください。", true);
        return;
      }

      try {
        await navigator.clipboard.writeText(outputBox.value);
        setStatus("クリップボードに書き出しました。");
      } catch (error) {
        console.error(error);
        outputBox.select();
        setStatus("クリップボードへの書き出しに失敗しました。出力欄を手動でコピーしてください。", true);
      }
    }

    loadButton.addEventListener("click", loadCharacter);
    copyButton.addEventListener("click", copyOutput);
  </script>
</body>
</html>
