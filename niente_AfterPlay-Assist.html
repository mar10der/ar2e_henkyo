<!doctype html>
<html lang="ja">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AR2E セッション入力補助</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f9;
      --panel: #ffffff;
      --text: #222831;
      --muted: #667085;
      --line: #d9dee7;
      --accent: #2f6fed;
      --accent-dark: #2458bd;
      --danger: #b42318;
      --danger-bg: #fff4f2;
      --ok-bg: #f0f7ff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.6;
    }

    main {
      width: min(920px, calc(100% - 32px));
      margin: 0 auto;
      padding: 32px 0 48px;
    }

    h1 {
      margin: 0 0 24px;
      font-size: 28px;
      line-height: 1.25;
      letter-spacing: 0;
    }

    h2 {
      margin: 0 0 16px;
      font-size: 18px;
      letter-spacing: 0;
    }

    .mode-switch {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }

    .mode-button {
      color: var(--text);
      background: #fff;
      border-color: var(--line);
    }

    .mode-button.active {
      color: #fff;
      background: var(--accent);
      border-color: var(--accent);
    }

    section {
      margin-top: 20px;
      padding: 24px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    input,
    textarea {
      width: 100%;
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 9px 11px;
      color: var(--text);
      background: #fff;
      font: inherit;
    }

    textarea {
      min-height: 92px;
      resize: vertical;
    }

    input:focus,
    textarea:focus {
      border-color: var(--accent);
      outline: 3px solid rgba(47, 111, 237, 0.16);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
    }

    .session-fields {
      display: grid;
      gap: 14px;
    }

    .input-with-button {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: start;
    }

    .field {
      margin-bottom: 16px;
    }

    .url-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: end;
      margin-bottom: 10px;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 18px;
    }

    button {
      min-height: 40px;
      border: 1px solid transparent;
      border-radius: 6px;
      padding: 8px 14px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }

    button.primary {
      color: #fff;
      background: var(--accent);
    }

    button.primary:hover {
      background: var(--accent-dark);
    }

    button.secondary {
      color: var(--text);
      background: #fff;
      border-color: var(--line);
    }

    button.danger {
      color: var(--danger);
      background: var(--danger-bg);
      border-color: #ffd7d2;
    }

    .output {
      min-height: 64px;
      padding: 14px;
      border-radius: 6px;
      border: 1px solid #c7ddff;
      background: var(--ok-bg);
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }

    .status {
      margin-top: 12px;
      min-height: 24px;
      color: var(--muted);
      font-size: 14px;
    }

    .status.error {
      color: var(--danger);
    }

    .sheet-result {
      min-height: 26px;
      margin-top: 8px;
      color: var(--muted);
      font-size: 14px;
      overflow-wrap: anywhere;
    }

    .sheet-result.loaded {
      color: var(--text);
      font-weight: 700;
    }

    .sheet-result.error {
      color: var(--danger);
      font-weight: 700;
    }

    .sheet-result-line {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 12px;
      align-items: center;
    }

    .guild-toggle {
      min-height: 28px;
      padding: 3px 10px;
      color: var(--muted);
      background: #fff;
      border-color: var(--line);
      font-size: 13px;
    }

    .guild-toggle.active {
      color: #fff;
      background: var(--accent);
      border-color: var(--accent);
    }

    body.mode-pl .gm-only {
      display: none;
    }

    body.mode-gm .pl-only {
      display: none;
    }

    @media (max-width: 720px) {
      main {
        width: min(100% - 24px, 920px);
        padding-top: 20px;
      }

      section {
        padding: 18px;
      }

      .grid,
      .input-with-button,
      .url-row {
        grid-template-columns: 1fr;
      }

      .url-row button {
        width: 100%;
      }
    }
  </style>
</head>

<body class="mode-gm">
  <main>
    <h1>AR2E セッション入力補助</h1>

    <div class="mode-switch" aria-label="使用モード">
      <button class="mode-button active" type="button" id="gmModeButton" aria-pressed="true">GM用</button>
      <button class="mode-button" type="button" id="plModeButton" aria-pressed="false">PL用</button>
    </div>


    <section aria-labelledby="players-heading">
      <h2 id="players-heading">PCのゆとシートURL</h2>
      <div id="urlList"></div>
      <div class="actions">
        <button class="primary" type="button" id="loadSheetsInline">読み込み</button>
        <button class="secondary" type="button" id="addUrl">URLを追加</button>
      </div>
      <p class="status" id="status" aria-live="polite"></p>
    </section>



    <section aria-labelledby="session-heading">
      <h2 id="session-heading">セッション情報</h2>
      <div class="session-fields">
        <div>
          <label for="sessionDate">日付</label>
          <div class="input-with-button">
            <input id="sessionDate" type="text" inputmode="numeric">
            <button class="secondary copy-session-field" type="button" data-copy-target="sessionDate">コピー</button>
          </div>
        </div>
        <div>
          <label for="scenarioTitle">シナリオタイトル</label>
          <div class="input-with-button">
            <input id="scenarioTitle" type="text">
            <button class="secondary copy-session-field" type="button" data-copy-target="scenarioTitle">コピー</button>
          </div>
        </div>
        <div>
          <label for="growthPoint">成長点</label>
          <div class="input-with-button">
            <input id="growthPoint" type="number" min="0" inputmode="numeric">
            <button class="secondary copy-session-field" type="button" data-copy-target="growthPoint">コピー</button>
          </div>
        </div>
        <div>
          <label for="gold">ゴールド</label>
          <div class="input-with-button">
            <input id="gold" type="number" min="0" inputmode="numeric">
            <button class="secondary copy-session-field" type="button" data-copy-target="gold">コピー</button>
          </div>
        </div>
        <div>
          <label for="gmName">GM名</label>
          <div class="input-with-button">
            <input id="gmName" type="text" autocomplete="name">
            <button class="secondary copy-session-field" type="button" data-copy-target="gmName">コピー</button>
          </div>
        </div>
      </div>
    </section>

    <section aria-labelledby="output-heading">
      <h2 id="output-heading">参加者</h2>
      <div class="output" id="output"></div>
      <div class="actions">
        <button class="primary" type="button" id="loadSheets">読み込んで出力</button>
        <button class="secondary" type="button" id="copyOutput">コピー</button>
      </div>
    </section>

    <section class="pl-only" aria-labelledby="guild-output-heading">
      <h2 id="guild-output-heading">ギルド出力</h2>
      <div class="output" id="guildOutput"></div>
      <div class="actions">
        <button class="secondary" type="button" id="copyGuildOutput">コピー</button>
      </div>
    </section>

    <section class="gm-only" aria-labelledby="rich-output-heading">
      <h2 id="rich-output-heading">リッチな出力</h2>
      <div class="output" id="richOutput"></div>
      <div class="actions">
        <button class="secondary" type="button" id="copyRichOutput">コピー</button>
      </div>
    </section>
  </main>

  <script>
    const urlList = document.querySelector("#urlList");
    const status = document.querySelector("#status");
    const output = document.querySelector("#output");
    const guildOutput = document.querySelector("#guildOutput");
    const richOutput = document.querySelector("#richOutput");
    const addUrlButton = document.querySelector("#addUrl");
    const loadSheetsButton = document.querySelector("#loadSheets");
    const loadSheetsInlineButton = document.querySelector("#loadSheetsInline");
    const copyOutputButton = document.querySelector("#copyOutput");
    const copyGuildOutputButton = document.querySelector("#copyGuildOutput");
    const copyRichOutputButton = document.querySelector("#copyRichOutput");
    const gmModeButton = document.querySelector("#gmModeButton");
    const plModeButton = document.querySelector("#plModeButton");
    const copySessionFieldButtons = document.querySelectorAll(".copy-session-field");
    const scenarioTitleInput = document.querySelector("#scenarioTitle");
    const sessionDateInput = document.querySelector("#sessionDate");
    const gmNameInput = document.querySelector("#gmName");
    const growthPointInput = document.querySelector("#growthPoint");
    const goldInput = document.querySelector("#gold");
    let urlRowCount = 0;
    let sessionInfo = {};
    let currentMode = "gm";
    let loadedSheets = [];

    function getJapanDateString() {
      return new Intl.DateTimeFormat("ja-JP", {
        timeZone: "Asia/Tokyo",
        year: "numeric",
        month: "2-digit",
        day: "2-digit",
      }).format(new Date());
    }

    function saveSessionInfo() {
      sessionInfo = {
        mode: currentMode,
        scenarioTitle: scenarioTitleInput.value.trim(),
        date: sessionDateInput.value.trim(),
        gmName: gmNameInput.value.trim(),
        growthPoint: growthPointInput.value,
        gold: goldInput.value,
      };
      updateGuildOutput();
      updateRichOutput();
      return sessionInfo;
    }

    function buildParticipantOutput(sheets) {
      return sheets
        .map((sheet) => `[${sheet.pcName}#${sheet.id}]／${sheet.plName}さん`)
        .join("、");
    }

    function buildRichOutput(participants) {
      return `日付
\`\`\`
${sessionInfo.date}
\`\`\`
シナリオタイトル
\`\`\`
${sessionInfo.scenarioTitle}
\`\`\`
成長点
\`\`\`
${sessionInfo.growthPoint}
\`\`\`
ゴールド
\`\`\`
${sessionInfo.gold}
\`\`\`
GM
\`\`\`
${sessionInfo.gmName}
\`\`\`
参加者
\`\`\`
${participants}
\`\`\``;
    }

    function buildGuildOutput() {
      const guildMembers = loadedSheets
        .filter((sheet) => sheet.guildEnabled)
        .map((sheet) => `${sheet.pcName}(${sheet.level}+${sheet.level})`)
        .join("、");
      return `${sessionInfo.date}「${sessionInfo.scenarioTitle}」${guildMembers}`;
    }

    function updateGuildOutput() {
      if (!guildOutput) {
        return;
      }

      guildOutput.textContent = buildGuildOutput();
    }

    function updateRichOutput() {
      if (!richOutput) {
        return;
      }

      richOutput.textContent = buildRichOutput(output.textContent);
    }

    function setMode(mode) {
      currentMode = mode;
      document.body.classList.toggle("mode-gm", mode === "gm");
      document.body.classList.toggle("mode-pl", mode === "pl");
      gmModeButton.classList.toggle("active", mode === "gm");
      plModeButton.classList.toggle("active", mode === "pl");
      gmModeButton.setAttribute("aria-pressed", String(mode === "gm"));
      plModeButton.setAttribute("aria-pressed", String(mode === "pl"));
      saveSessionInfo();
    }

    function createUrlRow(value = "") {
      const row = document.createElement("div");
      row.className = "url-row";

      const field = document.createElement("div");
      field.className = "field";

      const label = document.createElement("label");
      label.textContent = "ゆとシートURL";

      const input = document.createElement("input");
      input.type = "url";
      input.placeholder = "https://yutorize.work/ytsheet/ar2e/?id=xxxxxx";
      input.value = value;

      urlRowCount += 1;
      label.htmlFor = `sheetUrl-${urlRowCount}`;
      input.id = label.htmlFor;

      const result = document.createElement("div");
      result.className = "sheet-result";
      result.textContent = "未読み込み";

      const resultLine = document.createElement("div");
      resultLine.className = "sheet-result-line";

      const guildToggle = document.createElement("button");
      guildToggle.className = "guild-toggle pl-only active";
      guildToggle.type = "button";
      guildToggle.textContent = "ギルド";
      guildToggle.setAttribute("aria-pressed", "true");
      guildToggle.addEventListener("click", () => {
        const enabled = !row.sheet?.guildEnabled;
        if (!row.sheet) {
          return;
        }

        row.sheet.guildEnabled = enabled;
        guildToggle.classList.toggle("active", enabled);
        guildToggle.setAttribute("aria-pressed", String(enabled));
        updateGuildOutput();
      });

      const removeButton = document.createElement("button");
      removeButton.className = "danger";
      removeButton.type = "button";
      removeButton.textContent = "削除";
      removeButton.addEventListener("click", () => {
        loadedSheets = loadedSheets.filter((sheet) => sheet !== row.sheet);
        row.remove();
        updateGuildOutput();
        if (!urlList.children.length) {
          createUrlRow();
        }
      });

      resultLine.append(result, guildToggle);
      field.append(label, input, resultLine);
      row.append(field, removeButton);
      urlList.append(row);
      return input;
    }

    function getSheetId(sheetUrl) {
      const url = new URL(sheetUrl);
      const id = url.searchParams.get("id");
      if (!id) {
        throw new Error("URLからidを取得できませんでした。");
      }
      return id;
    }

    function toJsonUrl(sheetUrl) {
      const url = new URL(sheetUrl);
      url.searchParams.set("mode", "json");
      return url.toString();
    }

    function normalizeGuildName(guildName) {
      if (!guildName) {
        return "未所属";
      }

      const text = String(guildName).trim();
      const linkedName = text.match(/^\[\[(.+?)(?:&gt;|>).*?\]\]$/);
      return linkedName ? linkedName[1].trim() || "未所属" : text;
    }

    async function loadSheet(sheetUrl) {
      const id = getSheetId(sheetUrl);
      const response = await fetch(toJsonUrl(sheetUrl));
      if (!response.ok) {
        throw new Error(`読み込みに失敗しました。HTTP ${response.status}`);
      }

      const data = await response.json();
      return {
        id,
        pcName: data.characterName || "PC名未設定",
        plName: data.playerName || "PL名未設定",
        guildName: normalizeGuildName(data.guildName),
        level: data.level || "CL未設定",
        guildEnabled: true,
      };
    }

    async function loadSheets() {
      saveSessionInfo();

      const rows = [...urlList.querySelectorAll(".url-row")];
      const entries = rows
        .map((row) => ({
          row,
          input: row.querySelector("input"),
          result: row.querySelector(".sheet-result"),
        }))
        .filter((entry) => entry.input.value.trim());

      status.className = "status";
      output.textContent = "";
      loadedSheets = [];
      updateGuildOutput();
      updateRichOutput();
      rows.forEach((row) => {
        const result = row.querySelector(".sheet-result");
        const guildToggle = row.querySelector(".guild-toggle");
        row.sheet = null;
        result.className = "sheet-result";
        result.textContent = row.querySelector("input").value.trim() ? "読み込み待ち" : "未入力";
        guildToggle.classList.add("active");
        guildToggle.setAttribute("aria-pressed", "true");
      });

      if (!entries.length) {
        status.textContent = "ゆとシートURLを1件以上入力してください。";
        status.classList.add("error");
        return;
      }

      loadSheetsButton.disabled = true;
      loadSheetsInlineButton.disabled = true;
      status.textContent = "読み込み中...";

      try {
        const results = await Promise.allSettled(
          entries.map((entry) => loadSheet(entry.input.value.trim()))
        );
        const sheets = [];

        results.forEach((result, index) => {
          const entry = entries[index];
          if (result.status === "fulfilled") {
            const sheet = result.value;
            sheets.push(sheet);
            entry.row.sheet = sheet;
            entry.result.className = "sheet-result loaded";
            entry.result.textContent = `PC名: ${sheet.pcName} ／ PL名: ${sheet.plName} ／ CL: ${sheet.level} ／ 所属ギルド: ${sheet.guildName}`;
          } else {
            entry.result.className = "sheet-result error";
            entry.result.textContent = result.reason.message;
          }
        });

        loadedSheets = sheets;
        output.textContent = buildParticipantOutput(sheets);
        updateGuildOutput();
        updateRichOutput();
        const failedCount = results.length - sheets.length;
        status.textContent = failedCount
          ? `${sheets.length}件読み込み、${failedCount}件失敗しました。`
          : `${sheets.length}件読み込みました。`;
        status.classList.toggle("error", failedCount > 0);
      } catch (error) {
        status.textContent = error.message;
        status.classList.add("error");
      } finally {
        loadSheetsButton.disabled = false;
        loadSheetsInlineButton.disabled = false;
      }
    }

    async function copyTextFromElement(element, message) {
      const text = "value" in element ? element.value : element.textContent;

      if (!text) {
        return;
      }

      if (navigator.clipboard) {
        await navigator.clipboard.writeText(text);
      } else {
        const range = document.createRange();
        const selection = window.getSelection();
        if ("select" in element) {
          element.select();
          document.execCommand("copy");
        } else {
          range.selectNodeContents(element);
          selection.removeAllRanges();
          selection.addRange(range);
          document.execCommand("copy");
          selection.removeAllRanges();
        }
      }
      status.className = "status";
      status.textContent = message;
    }

    addUrlButton.addEventListener("click", () => createUrlRow().focus());
    loadSheetsButton.addEventListener("click", loadSheets);
    loadSheetsInlineButton.addEventListener("click", loadSheets);
    copyOutputButton.addEventListener("click", () => copyTextFromElement(output, "出力をコピーしました。"));
    copyGuildOutputButton.addEventListener("click", () => copyTextFromElement(guildOutput, "ギルド出力をコピーしました。"));
    copyRichOutputButton.addEventListener("click", () => copyTextFromElement(richOutput, "リッチな出力をコピーしました。"));
    copySessionFieldButtons.forEach((button) => {
      button.addEventListener("click", () => {
        const target = document.querySelector(`#${button.dataset.copyTarget}`);
        const label = button.parentElement.parentElement.querySelector("label").textContent;
        copyTextFromElement(target, `${label}をコピーしました。`);
      });
    });
    gmModeButton.addEventListener("click", () => setMode("gm"));
    plModeButton.addEventListener("click", () => setMode("pl"));
    [scenarioTitleInput, sessionDateInput, gmNameInput, growthPointInput, goldInput]
      .forEach((input) => input.addEventListener("input", saveSessionInfo));

    sessionDateInput.value = getJapanDateString();
    setMode("gm");

    for (let index = 0; index < 4; index += 1) {
      createUrlRow();
    }
  </script>
</body>

</html>
